<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nextory Ads</title>
    <style>
      :root {
        --bg: #0b0b0f;
        --surface: #15151c;
        --surface-2: #1f1f29;
        --text: #f5f5f7;
        --muted: #9a9aa8;
        --accent: #ff5a36;
        --radius: 14px;
        --shadow: 0 30px 80px -20px rgba(0, 0, 0, 0.6),
          0 10px 30px -10px rgba(0, 0, 0, 0.4);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        background: #000;
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        font-size: 16px;
        line-height: 1.4;
        display: grid;
        place-items: center;
        min-height: 100dvh;
        padding: 24px;
      }

      .stage {
        width: 100%;
        max-width: 960px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .tabs {
        display: inline-flex;
        padding: 6px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        gap: 4px;
        max-width: 100%;
        overflow-x: auto;
        scrollbar-width: none;
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          inset 0 -1px 0 rgba(0, 0, 0, 0.4),
          0 10px 30px -10px rgba(0, 0, 0, 0.6);
      }
      .tabs::-webkit-scrollbar {
        display: none;
      }

      .tab {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--muted);
        font: inherit;
        font-weight: 500;
        padding: 10px 18px;
        border-radius: 999px;
        cursor: pointer;
        white-space: nowrap;
        transition:
          color 0.2s ease,
          background-color 0.2s ease,
          transform 0.2s ease;
      }
      .tab:hover {
        color: var(--text);
      }
      .tab:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      .tab[aria-selected="true"] {
        background: linear-gradient(
          180deg,
          rgba(60, 60, 65, 0.95) 0%,
          rgba(20, 20, 22, 0.95) 100%
        );
        color: #fff;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          inset 0 -1px 0 rgba(0, 0, 0, 0.6),
          0 8px 20px -8px rgba(0, 0, 0, 0.8);
      }

      .player {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #000;
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .player video {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        background: #000;
      }

      .play-overlay {
        appearance: none;
        border: 0;
        padding: 0;
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        cursor: pointer;
        background: rgba(0, 0, 0, 0.15);
        transition: opacity 0.25s ease;
      }
      .play-overlay:focus {
        outline: none;
      }
      .play-overlay:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.5);
        outline-offset: -4px;
      }
      .player.is-active .play-overlay {
        opacity: 0;
        pointer-events: none;
      }

      .play-button {
        width: clamp(110px, 16vw, 160px);
        aspect-ratio: 1;
        background: url("play-background.png") center / contain no-repeat;
        display: grid;
        place-items: center;
        transition: transform 0.2s ease;
        filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.5));
      }
      .play-overlay:hover .play-button {
        transform: scale(1.06);
      }

      .caption {
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      @media (max-width: 520px) {
        .tab {
          padding: 9px 14px;
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <div
        class="tabs"
        role="tablist"
        aria-label="Choose an ad"
      >
        <button
          class="tab"
          role="tab"
          aria-selected="true"
          data-src="NEXTORY_colleague_16x9_15s_EN_H264_25Mbit.mp4"
        >
          Ad 1: The Colleague
        </button>
        <button
          class="tab"
          role="tab"
          aria-selected="false"
          data-src="NEXTORY_kid_16x9_15s_EN_H264_25Mbit.mp4"
        >
          Ad 2: The Kid
        </button>
        <button
          class="tab"
          role="tab"
          aria-selected="false"
          data-src="NEXTORY_gamer_16x9_15s_EN_H264_25Mbit.mp4"
        >
          Ad 3: The Gamer
        </button>
      </div>

      <div class="player" id="player-wrap">
        <video
          id="player"
          playsinline
          preload="metadata"
          src="NEXTORY_colleague_16x9_15s_EN_H264_25Mbit.mp4#t=0.1"
        ></video>
        <button class="play-overlay" id="play-overlay" aria-label="Play video">
          <span class="play-button" aria-hidden="true"></span>
        </button>
      </div>

    </main>

    <script>
      const tabs = document.querySelectorAll(".tab");
      const video = document.getElementById("player");
      const playerWrap = document.getElementById("player-wrap");
      const overlay = document.getElementById("play-overlay");

      function activate() {
        playerWrap.classList.add("is-active");
        video.setAttribute("controls", "");
        video.play().catch(() => {});
      }

      function reset() {
        playerWrap.classList.remove("is-active");
        video.removeAttribute("controls");
      }

      overlay.addEventListener("click", activate);
      video.addEventListener("ended", reset);

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          if (tab.getAttribute("aria-selected") === "true") return;

          tabs.forEach((t) => t.setAttribute("aria-selected", "false"));
          tab.setAttribute("aria-selected", "true");

          video.pause();
          video.src = `${tab.dataset.src}#t=0.1`;
          video.load();
          reset();
        });
      });
    </script>
  </body>
</html>
