<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nextory — The Kid</title>
    <style>
      :root {
        --radius: 14px;
        --shadow:
          0 30px 80px -20px rgba(0, 0, 0, 0.6),
          0 10px 30px -10px rgba(0, 0, 0, 0.4);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        background: #000;
        color: #f5f5f7;
        font-family:
          -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100dvh;
        padding: 24px;
      }

      .player {
        position: relative;
        width: 100%;
        max-width: 960px;
        aspect-ratio: 16 / 9;
        background: #000;
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .player iframe {
        width: 100%;
        height: 100%;
        display: block;
        border: 0;
        background: #000;
      }

      .play-overlay {
        appearance: none;
        border: 0;
        padding: 0;
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        cursor: pointer;
        background: rgba(0, 0, 0, 0.15);
        transition: opacity 0.25s ease;
      }
      .play-overlay:focus {
        outline: none;
      }
      .play-overlay:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.5);
        outline-offset: -4px;
      }
      .player.is-active .play-overlay {
        opacity: 0;
        pointer-events: none;
      }

      .play-button {
        width: clamp(110px, 16vw, 160px);
        aspect-ratio: 1;
        background: url("play-background.png") center / contain no-repeat;
        display: grid;
        place-items: center;
        transition: transform 0.2s ease;
        filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.5));
      }
      .play-overlay:hover .play-button {
        transform: scale(1.06);
      }
    </style>
  </head>
  <body>
    <div class="player" id="player-wrap">
      <iframe
        id="player"
        src="https://player.vimeo.com/video/1195547016?controls=0&title=0&byline=0&portrait=0&dnt=1"
        allow="autoplay; fullscreen; picture-in-picture"
        allowfullscreen
      ></iframe>
      <button class="play-overlay" id="play-overlay" aria-label="Play video">
        <span class="play-button" aria-hidden="true"></span>
      </button>
    </div>

    <script src="https://player.vimeo.com/api/player.js"></script>
    <script>
      const iframe = document.getElementById("player");
      const playerWrap = document.getElementById("player-wrap");
      const overlay = document.getElementById("play-overlay");

      const VIDEO_ID = "1195547016";
      const idleUrl = `https://player.vimeo.com/video/${VIDEO_ID}?controls=0&title=0&byline=0&portrait=0&dnt=1`;
      const playUrl = `https://player.vimeo.com/video/${VIDEO_ID}?controls=1&title=0&byline=0&portrait=0&dnt=1`;

      let player = new Vimeo.Player(iframe);

      function bindEnded() {
        player.on("ended", () => {
          iframe.src = idleUrl;
          player = new Vimeo.Player(iframe);
          bindEnded();
          playerWrap.classList.remove("is-active");
        });
      }
      bindEnded();

      overlay.addEventListener("click", () => {
        iframe.src = playUrl;
        player = new Vimeo.Player(iframe);
        bindEnded();
        player
          .ready()
          .then(() => player.play())
          .catch(() => {});
        playerWrap.classList.add("is-active");
      });
    </script>
  </body>
</html>
