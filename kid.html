<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nextory — The Kid</title>
    <style>
      :root {
        --radius: 14px;
        --shadow:
          0 30px 80px -20px rgba(0, 0, 0, 0.6),
          0 10px 30px -10px rgba(0, 0, 0, 0.4);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        background: #000;
        color: #f5f5f7;
        font-family:
          -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100dvh;
        padding: 24px;
      }

      .player {
        position: relative;
        width: 100%;
        max-width: 960px;
        aspect-ratio: 16 / 9;
        background: #000;
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .player video {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        background: #000;
      }

      .play-overlay {
        appearance: none;
        border: 0;
        padding: 0;
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        cursor: pointer;
        background: rgba(0, 0, 0, 0.15);
        transition: opacity 0.25s ease;
        z-index: 2;
      }
      .play-overlay:focus {
        outline: none;
      }
      .play-overlay:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.5);
        outline-offset: -4px;
      }
      .player.is-active .play-overlay {
        opacity: 0;
        pointer-events: none;
      }

      .play-button {
        width: clamp(110px, 16vw, 160px);
        aspect-ratio: 1;
        background: url("play-background.png") center / contain no-repeat;
        display: grid;
        place-items: center;
        transition: transform 0.2s ease;
        filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.5));
      }
      .play-overlay:hover .play-button {
        transform: scale(1.06);
      }
    </style>
  </head>
  <body>
    <div class="player" id="player-wrap">
      <video
        id="player"
        playsinline
        preload="metadata"
        src="NEXTORY_kid_16x9_15s_EN_H264_25Mbit.mp4#t=0.1"
      ></video>
      <button class="play-overlay" id="play-overlay" aria-label="Play video">
        <span class="play-button" aria-hidden="true"></span>
      </button>
    </div>

    <script>
      const video = document.getElementById("player");
      const playerWrap = document.getElementById("player-wrap");
      const overlay = document.getElementById("play-overlay");

      overlay.addEventListener("click", () => {
        playerWrap.classList.add("is-active");
        video.setAttribute("controls", "");
        video.muted = false;
        video.volume = 1;
        video.play().catch(() => {});
      });

      video.addEventListener("ended", () => {
        playerWrap.classList.remove("is-active");
        video.removeAttribute("controls");
        video.currentTime = 0;
      });
    </script>
  </body>
</html>
